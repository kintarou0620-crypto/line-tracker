<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ご案内中...</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top: 4px solid #06c755;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .message {
      font-size: 16px;
      line-height: 1.6;
    }
    .error {
      color: #d32f2f;
      font-size: 14px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <div class="message" id="message">ご案内中です。少々お待ちください...</div>
  <div class="error" id="error"></div>

  <script>
    // ========= ここを自分の値に書き換える =========
    const LIFF_ID = '2009898086-TOW4Tvae';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby1cd2ff6yavvXjR0N6c7rNPmQ_prEjfKsb81FFsI7rOC0inPdp_geG8bra6UaIE42wOw/exec';
    const LINE_ADD_URL = 'https://line.me/R/ti/p/@095ulijt';
    // =============================================

    async function main() {
      try {
        // LIFF初期化
        await liff.init({ liffId: LIFF_ID });

        // 未ログインならログイン処理（ここで自動的に友だち追加プロンプトも出る）
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // クエリパラメータから経路を取得
        const params = new URLSearchParams(location.search);
        const route = params.get('route') || 'unknown';

        // ユーザー情報取得
        const profile = await liff.getProfile();

        // GASに追跡データを送信
        await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            type: 'track',
            userId: profile.userId,
            route: route
          })
        });

        // 友だち状態をチェック
        const friendship = await liff.getFriendship();

        if (!friendship.friendFlag) {
          // 未追加 → 友だち追加URLへ誘導
          document.getElementById('message').innerText = '友だち追加ページに移動します...';
          setTimeout(() => {
            location.href = LINE_ADD_URL;
          }, 800);
        } else {
          // 既に友だち → 完了表示
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('message').innerText =
            'すでにお友だちです！\nLINEアプリに戻ってください。';
          // LIFFを閉じる（LINEアプリ内で開かれている場合）
          setTimeout(() => {
            if (liff.isInClient()) liff.closeWindow();
          }, 2000);
        }

      } catch (err) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('message').innerText = 'エラーが発生しました';
        document.getElementById('error').innerText = err.message || err.toString();
        console.error(err);
      }
    }

    main();
  </script>
</body>
</html>
